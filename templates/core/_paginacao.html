{% if is_paginated %}
<nav class="mt-4 flex items-center justify-between border-t border-surface-400 bg-surface-200 px-4 py-3 sm:px-6 rounded-b-xl">
  <div class="hidden sm:block">
    <p class="text-sm text-gray-400">
      Mostrando <span class="font-medium text-gray-300">{{ page_obj.start_index }}</span> a
      <span class="font-medium text-gray-300">{{ page_obj.end_index }}</span> de
      <span class="font-medium text-gray-300">{{ paginator.count }}</span> resultados
    </p>
  </div>
  <div class="flex flex-1 justify-between sm:justify-end gap-2">
    {% if page_obj.has_previous %}
      <a href="?{% if request.GET.urlencode %}{{ request.GET.urlencode }}&{% endif %}page={{ page_obj.previous_page_number }}" class="btn-secondary">Anterior</a>
    {% endif %}
    {% if page_obj.has_next %}
      <a href="?{% if request.GET.urlencode %}{{ request.GET.urlencode }}&{% endif %}page={{ page_obj.next_page_number }}" class="btn-secondary">Próxima</a>
    {% endif %}
  </div>
</nav>
{% endif %}
