{% extends "base.html" %}
{% block title %}Confirmar exclusão · {{ app_name }}{% endblock %}

{% block content %}
<div class="card p-8 max-w-lg">
  <h1 class="text-xl font-bold text-gray-100">Confirmar exclusão</h1>
  <p class="mt-2 text-sm text-gray-400">
    Tem certeza que deseja excluir <strong class="text-gray-200">{{ object }}</strong>? Esta ação não pode ser desfeita.
  </p>
  <form method="post" class="mt-6 flex justify-end gap-2">
    {% csrf_token %}
    <a href="{{ request.META.HTTP_REFERER|default:'/' }}" class="btn-secondary">Cancelar</a>
    <button type="submit" class="rounded-md bg-red-600 px-4 py-2 text-sm font-semibold text-white hover:bg-red-700">Sim, excluir</button>
  </form>
</div>
{% endblock %}
